<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Family Calendar">
<meta name="theme-color" content="#f7f1e8">
<link rel="apple-touch-icon" href="./icon.png">
<link rel="icon" type="image/png" href="./icon.png">
<title>Family Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Manrope:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Cream + dusty blue palette */
  --cream:        #f7f1e8;
  --cream-soft:   #fdf9f3;
  --cream-dark:   #ece4d4;
  --ink:          #2b3142;
  --ink-soft:     #4a5067;
  --muted:        #8a8a8a;
  --border:       #e6dfd0;

  --accent:       #a8b8d4;
  --accent-dark:  #5a7196;
  --accent-tint:  #e8eef7;

  --warn:         #c97a6b;
  --warn-tint:    #f5e3df;
  --sage:         #9eb89a;
  --sage-tint:    #e3ede1;

  /* Per-person colours (chips) */
  --p-jess:       #c97a6b;
  --p-jess-tint:  #f5e3df;
  --p-amus:       #5a7196;
  --p-amus-tint:  #e8eef7;
  --p-mum:        #b08bb5;
  --p-mum-tint:   #efe6f1;
  --p-house:      #7d8d6e;
  --p-house-tint: #e6ebde;

  --p-dad:        #6b8a8c;
  --p-dad-tint:   #dfe9ea;

  --p-milk:       #b89a7a;
  --p-milk-tint:  #f0e8dc;
  --p-bb:         #d49775;
  --p-bb-tint:    #f5e3d4;
  --p-cilla:      #c4a96a;
  --p-cilla-tint: #f1e8c9;

  --shadow:       0 1px 2px rgba(43, 49, 66, 0.04), 0 2px 8px rgba(43, 49, 66, 0.04);
  --shadow-lift:  0 2px 4px rgba(43, 49, 66, 0.06), 0 6px 18px rgba(43, 49, 66, 0.08);
  --radius:       16px;
  --radius-sm:    10px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Manrope', system-ui, -apple-system, sans-serif;
  background: var(--cream);
  color: var(--ink);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* Chinese mode: swap font stacks */
body.lang-zh {
  font-family: 'Noto Sans TC', 'Manrope', system-ui, sans-serif;
}
body.lang-zh .brand,
body.lang-zh .card h2,
body.lang-zh .modal h3,
body.lang-zh .day-editor .day-title,
body.lang-zh .bills-section-head,
body.lang-zh .cal-nav .month-label,
body.lang-zh .datestamp .day,
body.lang-zh .empty-state em,
body.lang-zh .amount {
  font-family: 'Noto Serif TC', 'Fraunces', serif;
}
body.lang-zh .brand em,
body.lang-zh .card h2 em,
body.lang-zh .modal h3 em,
body.lang-zh .cal-nav .month-label em,
body.lang-zh .empty-state em {
  /* Chinese has no italic — use weight + colour instead */
  font-style: normal;
  font-weight: 600;
}

/* Language toggle pill */
.lang-toggle {
  display: inline-flex;
  background: var(--cream-dark);
  border-radius: 999px;
  padding: 3px;
  margin-top: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.lang-toggle button {
  padding: 4px 10px;
  border-radius: 999px;
  color: var(--muted);
  transition: all 0.2s;
  min-width: 28px;
}
.lang-toggle button.active {
  background: var(--cream-soft);
  color: var(--accent-dark);
  box-shadow: var(--shadow);
}

body::before, body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
body::before {
  background: radial-gradient(circle at 15% 10%, var(--accent-tint), transparent 55%);
  opacity: 0.6;
}
body::after {
  background: radial-gradient(circle at 85% 90%, var(--sage-tint), transparent 55%);
  opacity: 0.45;
}

input, textarea, select { -webkit-user-select: text; user-select: text; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; font-size: 16px; color: var(--ink); }

.app {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding:
    calc(env(safe-area-inset-top) + 18px)
    calc(env(safe-area-inset-right) + 18px)
    calc(env(safe-area-inset-bottom) + 32px)
    calc(env(safe-area-inset-left) + 18px);
}

/* ---------- Header ---------- */
.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 18px;
  gap: 12px;
}
.brand {
  font-family: 'Fraunces', serif;
  font-size: 32px;
  font-weight: 600;
  line-height: 1.05;
  letter-spacing: -0.5px;
}
.brand em {
  font-style: italic;
  font-weight: 500;
  color: var(--accent-dark);
}
.datestamp {
  text-align: right;
  flex-shrink: 0;
}
.datestamp .month {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}
.datestamp .day {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 16px;
  color: var(--ink-soft);
  margin-top: 2px;
}

/* ---------- Sync status pill ---------- */
.sync-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--cream-dark);
  color: var(--muted);
  margin-bottom: 14px;
}
.sync-pill .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
}
.sync-pill.ok { background: var(--sage-tint); color: var(--sage); }
.sync-pill.ok .dot { background: var(--sage); }
.sync-pill.syncing { background: var(--accent-tint); color: var(--accent-dark); }
.sync-pill.syncing .dot { background: var(--accent-dark); animation: pulse 1s infinite; }
.sync-pill.err { background: var(--warn-tint); color: var(--warn); }
.sync-pill.err .dot { background: var(--warn); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.sync-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  gap: 8px;
}
.sync-row .sync-pill {
  margin-bottom: 0;
}
.version-tag {
  font-size: 9px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.3px;
  font-variant-numeric: tabular-nums;
  opacity: 0.6;
  white-space: nowrap;
}

/* ---------- Tab bar ---------- */
.tabbar {
  display: flex;
  background: var(--cream-dark);
  border-radius: 12px;
  padding: 4px;
  gap: 2px;
  margin-bottom: 22px;
}
.tabbar button {
  flex: 1;
  padding: 10px 8px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-soft);
  transition: all 0.2s;
}
.tabbar button.active {
  background: var(--cream-soft);
  color: var(--accent-dark);
  box-shadow: var(--shadow);
}
.tab-badge {
  display: inline-block;
  margin-left: 4px;
  background: var(--warn);
  color: white;
  font-size: 10px;
  font-weight: 700;
  min-width: 16px;
  height: 16px;
  line-height: 16px;
  padding: 0 4px;
  border-radius: 999px;
  vertical-align: 1px;
}

/* ---------- View transitions ---------- */
.view {
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---------- Card ---------- */
.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card h2 {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  margin: 0 0 4px;
}
.card h2 em {
  font-style: italic;
  font-weight: 500;
  color: var(--accent-dark);
}
.card .subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
}

/* ---------- Calendar ---------- */
.cal-toggle {
  display: flex;
  background: var(--cream-dark);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 14px;
  gap: 2px;
}
.cal-toggle button {
  flex: 1;
  padding: 8px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-soft);
  transition: all 0.2s;
}
.cal-toggle button.active {
  background: var(--cream-soft);
  color: var(--accent-dark);
  box-shadow: var(--shadow);
}

.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.cal-nav .nav-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--cream-soft);
  border: 1px solid var(--border);
  font-size: 16px;
  color: var(--ink-soft);
  display: flex; align-items: center; justify-content: center;
}
.cal-nav .nav-btn:active { background: var(--cream-dark); }
.cal-nav .month-label {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 600;
}
.cal-nav .month-label em {
  font-style: italic;
  font-weight: 500;
  color: var(--accent-dark);
}

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 6px;
}
.cal-weekdays div {
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 4px 0;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-day {
  aspect-ratio: 1;
  border-radius: 8px;
  background: var(--cream-soft);
  border: 1px solid transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 4px 2px;
  position: relative;
  font-size: 13px;
  color: var(--ink);
  transition: all 0.15s;
  overflow: hidden;
}
.cal-day.future { opacity: 0.7; }
.cal-day.other-month { opacity: 0.3; }
.cal-day.today {
  border: 2px solid var(--ink);
  font-weight: 700;
}
.cal-day.has-items {
  background: linear-gradient(135deg, var(--accent-tint), white);
}
.cal-day.selected {
  background: var(--accent-dark);
  color: white;
}
.cal-day:active { transform: scale(0.96); }

.cal-day .day-num { font-weight: 600; line-height: 1; }
.cal-day .dots {
  display: flex;
  gap: 2px;
  margin-top: 3px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 100%;
}
.cal-day .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent-dark);
}
.cal-day.selected .dot { background: white; }

/* ---------- Day editor ---------- */
.day-editor {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.day-editor .day-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 12px;
  color: var(--ink);
}
.day-editor .empty {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  padding: 12px 0;
}

/* ---------- Item row (event/bill in the day editor or list) ---------- */
.item-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: white;
  margin-bottom: 8px;
}
.item-row.paid {
  background: linear-gradient(135deg, var(--sage-tint), white);
}
.item-row .item-main {
  flex: 1;
  min-width: 0;
}
.item-row .item-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--ink);
  word-break: break-word;
}
.item-row .item-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.item-row .item-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

/* ---------- Assignee chip ---------- */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
}
.chip::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.chip.jess  { background: var(--p-jess-tint);  color: var(--p-jess); }
.chip.amus  { background: var(--p-amus-tint);  color: var(--p-amus); }
.chip.mum   { background: var(--p-mum-tint);   color: var(--p-mum); }
.chip.house { background: var(--p-house-tint); color: var(--p-house); }
.chip.dad   { background: var(--p-dad-tint);   color: var(--p-dad); }
.chip.milk  { background: var(--p-milk-tint);  color: var(--p-milk); }
.chip.bb    { background: var(--p-bb-tint);    color: var(--p-bb); }
.chip.cilla { background: var(--p-cilla-tint); color: var(--p-cilla); }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 11px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s;
  min-height: 44px;
}
.btn.primary {
  background: var(--accent-dark);
  color: white;
}
.btn.primary:active { background: var(--ink); }
.btn.secondary {
  background: white;
  border: 1px solid var(--accent);
  color: var(--accent-dark);
}
.btn.secondary:active { background: var(--accent-tint); }
.btn.danger {
  background: white;
  border: 1px solid var(--warn);
  color: var(--warn);
}
.btn.danger:active { background: var(--warn-tint); }
.btn.full { width: 100%; }

.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--cream-soft);
  border: 1px solid var(--border);
  font-size: 14px;
  color: var(--ink-soft);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:active { background: var(--cream-dark); }
.icon-btn.warn { color: var(--warn); }

.add-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius-sm);
  border: 2px dashed var(--accent);
  background: transparent;
  color: var(--accent-dark);
  font-size: 14px;
  font-weight: 600;
  margin-top: 8px;
}
.add-btn:active { background: var(--accent-tint); }

/* ---------- Timezone picker ---------- */
.tz-button {
  width: 100%;
  padding: 11px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: white;
  font-size: 14px;
  text-align: left;
  min-height: 44px;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tz-button:active { background: var(--cream-soft); }
.tz-button .placeholder { color: var(--muted); }
.tz-list {
  max-height: 50vh;
  overflow-y: auto;
  margin-top: 6px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: white;
  padding: 4px;
}
.tz-list .tz-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 9px 10px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--ink);
  background: transparent;
}
.tz-list .tz-item:active,
.tz-list .tz-item.active { background: var(--accent-tint); color: var(--accent-dark); }
.tz-list .tz-section {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 6px 10px 4px;
}
.tz-list .tz-empty {
  padding: 10px;
  font-size: 13px;
  color: var(--muted);
  text-align: center;
}

/* ---------- Travel block ---------- */
.travel-block {
  background: var(--cream-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 12px;
}
.travel-block .block-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 14px;
  color: var(--accent-dark);
  margin-bottom: 8px;
}

.travel-row .item-meta svg {
  vertical-align: -2px;
  margin-right: 3px;
}

/* ---------- Modal ---------- */
.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(43, 49, 66, 0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
.modal {
  background: var(--cream-soft);
  border-radius: 18px;
  width: 100%;
  max-width: 380px;
  padding: 22px;
  animation: scaleIn 0.25s ease;
  max-height: 90vh;
  overflow-y: auto;
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.94); }
  to   { opacity: 1; transform: scale(1); }
}
.modal h3 {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 600;
  margin: 0 0 16px;
}
.modal h3 em { font-style: italic; color: var(--accent-dark); font-weight: 500; }

/* View-only modal */
.modal h3.view-title {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-style: italic;
}
.modal h3.view-title svg {
  flex-shrink: 0;
}
.view-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 18px;
  padding: 14px;
  background: var(--cream-soft);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.view-row {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.view-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}
.view-value {
  font-size: 14px;
  color: var(--ink);
  word-break: break-word;
}
.view-value .chip {
  font-size: 11px;
  padding: 3px 9px;
}
.view-actions {
  gap: 8px;
}
.item-row {
  cursor: pointer;
}
.item-row:active .item-main {
  opacity: 0.7;
}

.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.field input[type="text"],
.field input[type="number"],
.field input[type="date"],
.field input[type="time"],
.field input[type="url"],
.field textarea,
.field select {
  width: 100%;
  padding: 11px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: white;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  min-height: 44px;
  transition: border-color 0.2s;
}
.field input:focus,
.field textarea:focus,
.field select:focus {
  border-color: var(--accent);
}
.field textarea { min-height: 70px; resize: vertical; }
.field .chip-picker {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.field .chip-picker button {
  padding: 7px 14px;
  border-radius: 999px;
  background: white;
  border: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-soft);
}
.field .chip-picker button.active {
  background: var(--accent-dark);
  border-color: var(--accent-dark);
  color: white;
}
.field .checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.field .checkbox-row input[type="checkbox"] {
  width: 20px; height: 20px;
  -webkit-appearance: auto; appearance: auto;
}
.field .checkbox-row span { font-size: 14px; }

.modal-actions {
  display: flex;

/* ---------- Settings sections ---------- */
.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin: 22px 0 8px;
  padding-left: 4px;
}

.field .help {
  font-size: 11px;
  color: var(--muted);
  margin-top: 5px;
  line-height: 1.4;
}
.field .help code {
  background: var(--cream-dark);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 10px;
}

.danger-card {
  border-color: var(--warn);
  background: linear-gradient(135deg, var(--warn-tint), white);
}

/* ---------- Toast ---------- */
.toast {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom) + 92px);
  left: 50%;
  transform: translateX(-50%) translateY(60px) scale(0.92);
  background: var(--ink);
  color: var(--cream);
  padding: 14px 26px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.2px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  z-index: 200;
  transition: transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
  pointer-events: none;
  opacity: 0;
  white-space: nowrap;
  max-width: 90vw;
}
.toast.show {
  transform: translateX(-50%) translateY(0) scale(1);
  opacity: 1;
}
.toast.error {
  background: var(--warn);
}

/* ---------- Bills list ---------- */
.bills-section-head {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 500;
  font-style: italic;
  color: var(--ink-soft);
  margin: 14px 0 8px;
}
.empty-state {
  text-align: center;
  padding: 30px 18px;
  color: var(--muted);
  font-size: 14px;
}
.empty-state em {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 500;
  color: var(--accent-dark);
}

.amount {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 15px;
  color: var(--ink);
  white-space: nowrap;
}
.amount.paid { color: var(--sage); text-decoration: line-through; opacity: 0.7; }

/* ---------- Backup banner ---------- */
.backup-banner {
  background: linear-gradient(135deg, var(--warn-tint), white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;

.backup-banner button {
  font-weight: 600;

.backup-banner .dismiss {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: transparent;
  color: var(--muted);
  font-size: 16px;
}

}
function setLang(lang) {
  try { localStorage.setItem(LANG_KEY, lang); } catch {}
  state.lang = lang;
  document.documentElement.lang = I18N[lang].htmlLang;
  document.body.classList.toggle('lang-zh', lang === 'zh');
  render();
}
function t(key) {
  const dict = I18N[state.lang || getLang()];
  return dict[key] != null ? dict[key] : I18N.en[key] || key;
}

// ----- LS helpers -----
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v == null ? fallback : JSON.parse(v); }
  catch { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ----- Date helpers -----
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function dateKey(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
function todayKey() { return dateKey(new Date()); }
function parseKey(k) {
  if (!k) return null;
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y, m-1, d);
}
function formatDayLabel(key) {
  const d = parseKey(key);
  if (!d) return '';
  const tk = todayKey();
  const yest = dateKey(new Date(Date.now() - 86400000));
  const tom  = dateKey(new Date(Date.now() + 86400000));
  if (key === tk)   return t('today');
  if (key === yest) return t('yesterday');
  if (key === tom)  return t('tomorrow');
  if (state.lang === 'zh') {
    return WEEKDAYS_FULL()[d.getDay()] + ', ' + (d.getMonth()+1) + '月' + d.getDate() + '日';
  }
  return WEEKDAYS_FULL()[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS()[d.getMonth()];
}
function uid() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
}

// Normalise time value coming back from Sheets into 'HH:mm' for display.
// Handles plain 'HH:mm', ISO timestamps from old Sheets serialisation, etc.
function formatTimezoneLabel(tz) {
  if (!tz) return '';
  // 'Europe/London' → 'London (Europe)'  /  'America/New_York' → 'New York (America)'
  const [region, ...rest] = tz.split('/');
  const city = rest.join('/').replace(/_/g, ' ');
  if (!city) return tz;
  return city + ' (' + region + ')';
}
function openTzPicker(side, mode) {
  // Stash the current modal so we can restore (e.g. when editing and picker is opened over an editTravel modal)
  const prev = state.modal;
  state.modal = { type: 'tzPicker', side, mode: mode || 'create', prev };
  state.tzPickerQuery = '';
  render();
}
function selectTimezone(tz) {
  const m = state.modal;
  if (!m || m.type !== 'tzPicker') return;
  const { side, mode, prev } = m;
  state.tzPickerQuery = '';
  if (mode === 'edit') {
    if (side === 'from') state.editTzFrom = tz;
    else if (side === 'to') state.editTzTo = tz;
  } else {
    if (side === 'from') state.createTzFrom = tz;
    else if (side === 'to') state.createTzTo = tz;
  }
  rememberTimezone(tz);
  // Restore previous modal (e.g. editTravel) so the user lands back on the form
  state.modal = prev || null;
  render();
}
function onTzSearchInput(v) {
  state.tzPickerQuery = v;
  // Just re-render the list without rebuilding the modal (preserves input focus)
  const list = document.getElementById('tz-list');
  if (!list) return;
  const query = (v || '').trim().toLowerCase();
  const all = getAllTimezones();
  if (!query) { render(); return; }
  const filtered = all.filter(z => z.toLowerCase().includes(query) || formatTimezoneLabel(z).toLowerCase().includes(query)).slice(0, 60);
  list.innerHTML = filtered.length
    ? filtered.map(z => `<button class="tz-item" onclick="selectTimezone('${escapeAttr(z)}')">${escapeHtml(formatTimezoneLabel(z))}</button>`).join('')
    : `<div class="tz-empty">${escapeHtml(t('tzPickerNoResults'))}</div>`;
}
function onDepartureDateChange() {
  // Default the arrival date to match departure if user hasn't set it
  const dep = document.getElementById('cf-date');
  const arr = document.getElementById('cf-end-date');
  if (dep && arr && (!arr.value || arr.value < dep.value)) {
    arr.value = dep.value;
  }
}

// Normalise time value coming back from Sheets into 'HH:mm' for display.
function formatTimeForDisplay(v) {
  if (v == null || v === '') return '';
  const s = String(v).trim();
  if (!s) return '';
  const m1 = s.match(/^(\d{1,2}):(\d{2})/);
  if (m1) return (m1[1].length < 2 ? '0' + m1[1] : m1[1]) + ':' + m1[2];
  const m2 = s.match(/T(\d{2}):(\d{2})/);
  if (m2) return m2[1] + ':' + m2[2];
  return '';
}

// Roll a date string forward by recurrence interval
function rollDate(dateStr, recurring) {
  if (!dateStr) return dateStr;
  const d = parseKey(dateStr);
  if (!d) return dateStr;
  if (recurring === 'daily')           d.setDate(d.getDate() + 1);
  else if (recurring === 'weekly')     d.setDate(d.getDate() + 7);
  else if (recurring === 'fortnightly') d.setDate(d.getDate() + 14);
  else if (recurring === 'monthly')    d.setMonth(d.getMonth() + 1);
  else if (recurring === 'quarterly')  d.setMonth(d.getMonth() + 3);
  else if (recurring === 'yearly')     d.setFullYear(d.getFullYear() + 1);
  else return dateStr;
  return dateKey(d);
}

// Truthiness for sheet cells (handles 'TRUE'/'FALSE' strings from Sheets)
function truthy(v) {
  if (v === true) return true;
  if (v === false) return false;
  if (v == null || v === '') return false;
  if (typeof v === 'string') {
    const s = v.toLowerCase();
    return s === 'true' || s === '1' || s === 'yes';
  }
  return !!v;
}

// ----- Sync layer -----
function getSyncUrl() { return lsGet(LS.syncUrl, ''); }
function setSyncUrl(url) { lsSet(LS.syncUrl, url); }

function setSync(status, msg) {
  state.syncStatus = status;
  state.syncMsg = msg || '';
  renderSyncPill();
}

async function syncPull() {
  const url = getSyncUrl();
  if (!url) { setSync('idle', t('syncIdle')); return; }
  setSync('syncing', t('syncSyncing'));
  try {
    const res = await fetch(url, { method: 'GET', redirect: 'follow' });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Server error');
    state.events = data.events || [];
    state.bills  = data.bills  || [];
    lsSet(LS.events, state.events);
    lsSet(LS.bills, state.bills);
    lsSet(LS.lastSync, new Date().toISOString());
    setSync('ok', t('syncOk'));
    rerenderActive();
  } catch (e) {
    setSync('err', t('syncOffline'));
  }
}

async function syncPost(action, kind, payload) {
  const url = getSyncUrl();
  if (!url) {
    queuePending({ action, kind, ...payload });
    setSync('err', t('syncNoUrl'));
    return false;
  }
  setSync('syncing', t('syncSaving'));
  try {
    const body = { action, kind, ...payload };
    const res = await fetch(url, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Server error');
    state.events = data.events || [];
    state.bills  = data.bills  || [];
    lsSet(LS.events, state.events);
    lsSet(LS.bills, state.bills);
    lsSet(LS.lastSync, new Date().toISOString());
    setSync('ok', t('syncOk'));
    return true;
  } catch (e) {
    queuePending({ action, kind, ...payload });
    setSync('err', t('syncQueued'));
    return false;
  }
}

function queuePending(change) {
  const q = lsGet(LS.pending, []);
  q.push(change);
  lsSet(LS.pending, q);
}

async function flushPending() {
  const q = lsGet(LS.pending, []);
  if (!q.length) return;
  const url = getSyncUrl();
  if (!url) return;
  try {
    const res = await fetch(url, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'bulk', changes: q })
    });
    const data = await res.json();
    if (data.ok) {
      lsSet(LS.pending, []);
      state.events = data.events || [];
      state.bills  = data.bills  || [];
      lsSet(LS.events, state.events);
      lsSet(LS.bills, state.bills);
      lsSet(LS.lastSync, new Date().toISOString());
      setSync('ok', t('syncOk'));
      toast(t('toastQueuedSaved'));
      rerenderActive();
    }
  } catch {}
}

function startPolling() {
  if (state.pollTimer) clearInterval(state.pollTimer);
  state.pollTimer = setInterval(() => {
    if (document.visibilityState === 'visible' && getSyncUrl()) {
      syncPull();
      flushPending();
    }
  }, POLL_MS);
}

// ----- Recurring expansion -----
function getExceptions(item) {
  if (!item.exceptions) return [];
  if (Array.isArray(item.exceptions)) return item.exceptions;
  try { return JSON.parse(item.exceptions); }
  catch { return []; }
}

function expandItemsByDate(items, fromKey, toKey) {
  const byDate = {};

  function pushOn(dateKey, item, extras) {
    if (dateKey < fromKey || dateKey > toKey) return;
    (byDate[dateKey] = byDate[dateKey] || []).push({ ...item, _instanceDate: dateKey, ...(extras || {}) });
  }

  items.forEach(it => {
    if (!it.date) return;
    const startKey = it.date;
    if (startKey > toKey) return;

    // Travel: render as a single row on the departure date (avoids visual clutter on arrival date)
    if (it.kind === 'travel') {
      pushOn(startKey, it, { _isRecurringInstance: false });
      return;
    }

    const exceptions = getExceptions(it);
    const recurring = it.recurring;

    if (!recurring || recurring === 'none' || recurring === '') {
      if (startKey >= fromKey && !exceptions.includes(startKey)) {
        pushOn(startKey, it, { _isRecurringInstance: false });
      }
      return;
    }
    const until = it.recur_until || '';
    let cursor = startKey;
    let safety = 0;
    while (cursor <= toKey && safety < 800) {
      if (until && cursor > until) break;
      if (cursor >= fromKey && !exceptions.includes(cursor)) {
        pushOn(cursor, it, { _isRecurringInstance: true });
      }
      const next = rollDate(cursor, recurring);
      if (!next || next <= cursor) break;
      cursor = next;
      safety++;
    }
  });
  return byDate;
}

// ----- Render: Calendar -----
function renderCalendar() {
  if (!state.viewMonth) state.viewMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  const vm = state.viewMonth;
  const year = vm.getFullYear(), month = vm.getMonth();

  const first = new Date(year, month, 1);
  const startWeekday = first.getDay(); // Sun=0, Mon=1, ..., Sat=6
  const gridStart = new Date(year, month, 1 - startWeekday);
  const gridEnd = new Date(gridStart);
  gridEnd.setDate(gridStart.getDate() + 41);
  const fromKey = dateKey(gridStart);
  const toKey = dateKey(gridEnd);

  const items = state.calMode === 'events' ? state.events : state.bills;
  const itemsByDate = expandItemsByDate(items, fromKey, toKey);

  const tk = todayKey();
  let cells = '';
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);
    const key = dateKey(d);
    const inMonth = d.getMonth() === month;
    const isToday = key === tk;
    const isSelected = key === state.selectedDate;
    const dayItems = itemsByDate[key] || [];
    const hasItems = dayItems.length > 0;

    const dots = dayItems.slice(0, 4).map(it => {
      const p = it.assignee && PERSON_BY_ID[it.assignee];
      const colour = p ? `var(--p-${p.id})` : 'var(--accent-dark)';
      return `<span class="dot" style="background:${colour}"></span>`;
    }).join('');

    cells += `
      <button class="cal-day ${inMonth?'':'other-month'} ${isToday?'today':''} ${hasItems?'has-items':''} ${isSelected?'selected':''}"
              onclick="selectDay('${key}')">
        <span class="day-num">${d.getDate()}</span>
        <span class="dots">${dots}</span>
      </button>
    `;
  }

  const monthLabel = state.lang === 'zh'
    ? `${year}<em>年${month+1}月</em>`
    : `${MONTHS()[month]}<em> ${year}</em>`;
  const wk = I18N[state.lang].weekdaysShort;

  let editor = '';
  if (state.selectedDate) {
    const dayItems = (itemsByDate[state.selectedDate] || []).slice().sort((a,b) => (a.time||'').localeCompare(b.time||''));
    const renderRow = state.calMode === 'events' ? renderEventRow : renderBillRow;
    editor = `
      <div class="day-editor">
        <div class="day-title">${formatDayLabel(state.selectedDate)}</div>
        ${dayItems.length === 0
          ? `<div class="empty">${escapeHtml(t('nothingYet'))}</div>`
          : dayItems.map(renderRow).join('')
        }
        <button class="add-btn" onclick="goToCreate('${state.calMode === 'events' ? 'event' : 'bill'}','${state.selectedDate}')">
          ${escapeHtml(t('addOnDay'))}
        </button>
      </div>
    `;
  }

  return `
    <div class="view">
      <div class="card">
        <div class="cal-toggle">
          <button class="${state.calMode==='events'?'active':''}" onclick="setCalMode('events')">${escapeHtml(t('calEvents'))}</button>
          <button class="${state.calMode==='bills'?'active':''}"  onclick="setCalMode('bills')">${escapeHtml(t('calBills'))}</button>
        </div>
        <div class="cal-nav">
          <button class="nav-btn" onclick="navMonth(-1)">‹</button>
          <div class="month-label">${monthLabel}</div>
          <button class="nav-btn" onclick="navMonth(1)">›</button>
        </div>
        <div class="cal-weekdays">
          <div>${escapeHtml(wk[0])}</div><div>${escapeHtml(wk[1])}</div><div>${escapeHtml(wk[2])}</div><div>${escapeHtml(wk[3])}</div><div>${escapeHtml(wk[4])}</div><div>${escapeHtml(wk[5])}</div><div>${escapeHtml(wk[6])}</div>
        </div>
        <div class="cal-grid">${cells}</div>
        ${editor}
      </div>
    </div>
  `;
}

function renderEventRow(ev) {
  const p = ev.assignee && PERSON_BY_ID[ev.assignee];
  const chip = p ? `<span class="chip ${p.cls}">${escapeHtml(personName(p.id))}</span>` : '';

  // Travel — single row rendering: "[icon] 13:45 → 14:35   London → New York"
  if (ev.kind === 'travel') {
    const startTime = formatTimeForDisplay(ev.time);
    const endTime = formatTimeForDisplay(ev.end_time);
    const timeStr = startTime && endTime ? `${startTime} → ${endTime}` : (startTime || endTime || '');
    const locStr = ev.from_location && ev.to_location
      ? `${ev.from_location} → ${ev.to_location}`
      : (ev.from_location || ev.to_location || '');
    const icon = travelIconSvg(ev.travel_method);
    const titleLine = ev.title ? escapeHtml(ev.title) : (locStr ? escapeHtml(locStr) : t('untitled'));
    const isInstance = false;
    const dateForArgs = ev._instanceDate || ev.date || '';
    const metaBits = [];
    if (timeStr) metaBits.push(`<span>${escapeHtml(timeStr)}</span>`);
    if (locStr && ev.title) metaBits.push(`<span>${escapeHtml(locStr)}</span>`);
    if (chip) metaBits.push(chip);
    return `
      <div class="item-row travel-row" onclick="openViewFlow('events','${ev.id}','${dateForArgs}',${isInstance})">
        <div class="item-main">
          <div class="item-title">${icon}${titleLine}</div>
          <div class="item-meta">${metaBits.join('')}</div>
          ${ev.notes ? `<div class="item-meta">${escapeHtml(ev.notes)}</div>` : ''}
        </div>
        <div class="item-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" onclick="openEditFlow('events','${ev.id}','${dateForArgs}',${isInstance})">✎</button>
          <button class="icon-btn warn" onclick="openDeleteFlow('events','${ev.id}','${dateForArgs}',${isInstance})">🗑</button>
        </div>
      </div>
    `;
  }

  const startTime = formatTimeForDisplay(ev.time);
  const endTime = formatTimeForDisplay(ev.end_time);
  const timeText = startTime
    ? (endTime ? `${startTime} → ${endTime}` : startTime)
    : '';
  const time = timeText ? `<span>${escapeHtml(timeText)}</span>` : '';
  const recurMap = { daily:'recDaily', weekly:'recWeekly', fortnightly:'recFortnightly', monthly:'recMonthly', yearly:'recYearly' };
  const recurring = ev.recurring && recurMap[ev.recurring]
    ? `<span>↻ ${escapeHtml(t(recurMap[ev.recurring]))}</span>` : '';
  // Task = event with explicit done field set on master
  const isTask = ev.done === true || ev.done === false || ev.done === 'true' || ev.done === 'false' || ev.done === 1 || ev.done === 0;
  const isDone = truthy(ev.done);
  const checkBtn = isTask
    ? `<button class="icon-btn" onclick="toggleEventDone('${ev.id}')">${isDone?'↺':'✓'}</button>`
    : '';
  const isInstance = !!ev._isRecurringInstance;
  const dateForArgs = ev._instanceDate || ev.date || '';
  return `
    <div class="item-row ${isDone?'paid':''}" onclick="openViewFlow('events','${ev.id}','${dateForArgs}',${isInstance})">
      <div class="item-main">
        <div class="item-title" style="${isDone?'text-decoration:line-through;opacity:0.6':''}">${escapeHtml(ev.title || t('untitled'))}</div>
        <div class="item-meta">${time}${chip}${recurring}</div>
        ${ev.notes ? `<div class="item-meta">${escapeHtml(ev.notes)}</div>` : ''}
      </div>
      <div class="item-actions" onclick="event.stopPropagation()">
        ${checkBtn}
        <button class="icon-btn" onclick="openEditFlow('events','${ev.id}','${dateForArgs}',${isInstance})">✎</button>
        <button class="icon-btn warn" onclick="openDeleteFlow('events','${ev.id}','${dateForArgs}',${isInstance})">🗑</button>
      </div>
    </div>
  `;
}

function renderBillRow(b) {
  const p = b.assignee && PERSON_BY_ID[b.assignee];
  const chip = p ? `<span class="chip ${p.cls}">${escapeHtml(personName(p.id))}</span>` : '';
  const recurMap = { daily:'recDaily', weekly:'recWeekly', fortnightly:'recFortnightly', monthly:'recMonthly', quarterly:'recQuarterly', yearly:'recYearly' };
  const recurring = b.recurring && recurMap[b.recurring]
    ? `<span>↻ ${escapeHtml(t(recurMap[b.recurring]))}</span>` : '';
  const paid = truthy(b.paid);
  const amountClass = paid ? 'amount paid' : 'amount';
  const amt = (b.amount || b.amount === 0) ? `<span class="${amountClass}">£${Number(b.amount).toFixed(2)}</span>` : '';
  const isInstance = !!b._isRecurringInstance;
  const dateForArgs = b._instanceDate || b.date || '';
  return `
    <div class="item-row ${paid?'paid':''}" onclick="openViewFlow('bills','${b.id}','${dateForArgs}',${isInstance})">
      <div class="item-main">
        <div class="item-title">${escapeHtml(b.title || t('untitled'))}</div>
        <div class="item-meta">${amt}${chip}${recurring}</div>
        ${b.notes ? `<div class="item-meta">${escapeHtml(b.notes)}</div>` : ''}
      </div>
      <div class="item-actions" onclick="event.stopPropagation()">
        <button class="icon-btn" onclick="togglePaid('${b.id}')">${paid?'↺':'✓'}</button>
        <button class="icon-btn" onclick="openEditFlow('bills','${b.id}','${dateForArgs}',${isInstance})">✎</button>
        <button class="icon-btn warn" onclick="openDeleteFlow('bills','${b.id}','${dateForArgs}',${isInstance})">🗑</button>
      </div>
    </div>
  `;
}

// ----- Render: Settings -----
function renderSettings() {
  const lastSync = lsGet(LS.lastSync, null);
  const lastSyncStr = lastSync ? new Date(lastSync).toLocaleString(state.lang === 'zh' ? 'zh-Hant-HK' : 'en-GB') : t('never');
  const pending = lsGet(LS.pending, []).length;

  const recurEvents = state.events.filter(e => e.recurring && e.recurring !== 'none' && e.recurring !== '');
  const recurBills  = state.bills.filter(b => b.recurring && b.recurring !== 'none' && b.recurring !== '');
  const recurMapEv  = { daily:'recDaily', weekly:'recWeekly', fortnightly:'recFortnightly', monthly:'recMonthly', yearly:'recYearly' };
  const recurMapBill = { daily:'recDaily', weekly:'recWeekly', fortnightly:'recFortnightly', monthly:'recMonthly', quarterly:'recQuarterly', yearly:'recYearly' };

  function recurRow(it, kind) {
    const p = it.assignee && PERSON_BY_ID[it.assignee];
    const chip = p ? `<span class="chip ${p.cls}">${escapeHtml(personName(p.id))}</span>` : '';
    const map = kind === 'events' ? recurMapEv : recurMapBill;
    const recurLabel = map[it.recurring] ? t(map[it.recurring]) : it.recurring;
    const until = it.recur_until ? ` · ${escapeHtml(t('untilLabel'))} ${escapeHtml(it.recur_until)}` : '';
    return `
      <div class="item-row">
        <div class="item-main">
          <div class="item-title">${escapeHtml(it.title || t('untitled'))}</div>
          <div class="item-meta">↻ ${escapeHtml(recurLabel)} · ${escapeHtml(t('fromLabel'))} ${escapeHtml(it.date||'')}${until}${chip}</div>
        </div>
        <div class="item-actions">
          <button class="icon-btn" onclick="openEditFlow('${kind}','${it.id}','${it.date||''}',false)">✎</button>

        </div>
      </div>

  }

  const recurBody = (recurEvents.length + recurBills.length === 0)
    ? `<div class="empty-state" style="padding:18px 0">${escapeHtml(t('noRecurring'))}</div>`
    : `${recurEvents.map(e => recurRow(e, 'events')).join('')}${recurBills.map(b => recurRow(b, 'bills')).join('')}`;

  return `
    <div class="view">
      <div class="card">
        <h2>${escapeHtml(t('recurringTitle1'))}<em>${escapeHtml(t('recurringTitle2'))}</em></h2>
        <div class="subtitle">${escapeHtml(t('recurringSubtitle'))}</div>

      </div>

      <div class="card">
        <h2>${escapeHtml(t('syncTitle1'))}<em>${escapeHtml(t('syncTitle2'))}</em></h2>
        <div class="subtitle">${escapeHtml(t('syncSubtitle'))}</div>
        <div class="field">
          <label>${escapeHtml(t('syncUrlLabel'))}</label>
          <input type="url" id="syncUrl" value="${escapeAttr(getSyncUrl())}" placeholder="https://script.google.com/macros/s/.../exec">
          <div class="help">${escapeHtml(t('syncHelp'))}</div>
        </div>
        <div class="modal-actions">
          <button class="btn secondary" onclick="testSync()">${escapeHtml(t('testPull'))}</button>
          <button class="btn primary" onclick="saveSyncUrl()">${escapeHtml(t('save'))}</button>
        </div>
        <div class="subtitle" style="margin-top:14px">
          ${escapeHtml(t('lastSync'))}: ${escapeHtml(lastSyncStr)}<br>
          ${escapeHtml(t('pendingChanges'))}: ${pending}

      <div class="card">
        <h2>${escapeHtml(t('backupTitle1'))}<em>${escapeHtml(t('backupTitle2'))}</em></h2>
        <div class="subtitle">${escapeHtml(t('backupSubtitle'))}</div>

// ----- Modals -----
function renderModal() {
  if (!state.modal) return '';
  const m = state.modal;

  if (m.type === 'viewItem') {
    const it = m.item || {};
    const kind = m.kind;
    const isBill = kind === 'bills';
    const isTravel = !isBill && it.kind === 'travel';
    const isTask = !isBill && !isTravel && (it.done === true || it.done === false || it.done === 'true' || it.done === 'false');

    // Build details rows
    const rows = [];
    function row(label, value) {
      if (value === null || value === undefined || value === '') return;
      rows.push(`<div class="view-row"><div class="view-label">${escapeHtml(label)}</div><div class="view-value">${value}</div></div>`);
    }

    // Date / time
    const dateStr = it.date || m.instanceDate || '';
    if (isTravel) {
      const startTime = formatTimeForDisplay(it.time);
      const endTime = formatTimeForDisplay(it.end_time);
      const endDate = it.end_date || dateStr;
      const sameDay = endDate === dateStr;
      row(t('fDepartDate'), escapeHtml(dateStr));
      if (startTime) row(t('fDepartTime'), escapeHtml(startTime));
      if (it.from_location) row(t('fFromLocation'), escapeHtml(it.from_location));
      if (it.from_tz) row(t('fFromTz'), escapeHtml(formatTimezoneLabel(it.from_tz)));
      if (!sameDay) row(t('fArriveDate'), escapeHtml(endDate));
      if (endTime) row(t('fArriveTime'), escapeHtml(endTime));
      if (it.to_location) row(t('fToLocation'), escapeHtml(it.to_location));
      if (it.to_tz) row(t('fToTz'), escapeHtml(formatTimezoneLabel(it.to_tz)));
      if (it.travel_method) {
        const methodKey = ({plane:'methodPlane',train:'methodTrain',drive:'methodDrive',bus:'methodBus',ferry:'methodFerry',other:'methodOther'})[it.travel_method] || '';
        row(t('fTravelMethod'), escapeHtml(methodKey ? t(methodKey) : it.travel_method));
      }
    } else {
      row(t('fDate'), escapeHtml(dateStr));
      const startTime = formatTimeForDisplay(it.time);
      const endTime = formatTimeForDisplay(it.end_time);
      const timeDisplay = startTime ? (endTime ? `${startTime} → ${endTime}` : startTime) : '';
      if (timeDisplay) row(t('fStartOpt').replace(/\s*\(.*\)$/,''), escapeHtml(timeDisplay));
      if (isBill && (it.amount || it.amount === 0)) row(t('fAmount'), `£${Number(it.amount).toFixed(2)}`);
    }

    // Assignee chip
    if (it.assignee) {
      const p = PERSON_BY_ID[it.assignee];
      const chip = p ? `<span class="chip ${p.cls}">${escapeHtml(personName(p.id))}</span>` : escapeHtml(it.assignee);
      row(t('fWho'), chip);
    }

    // Recurrence
    if (it.recurring && it.recurring !== 'none' && it.recurring !== '') {
      const recurMap = { daily:'recDaily', weekly:'recWeekly', fortnightly:'recFortnightly', monthly:'recMonthly', quarterly:'recQuarterly', yearly:'recYearly' };
      const recurLabel = recurMap[it.recurring] ? t(recurMap[it.recurring]) : it.recurring;
      const untilSuffix = it.recur_until ? ` · ${t('fRecurUntil').replace(/\s*\(.*\)$/,'')} ${escapeHtml(it.recur_until)}` : '';
      row(t('fRecurring'), `↻ ${escapeHtml(recurLabel)}${untilSuffix}`);
    }

    // Status flags
    if (isBill) {
      row(t('fPaid'), truthy(it.paid) ? '✓' : '—');
    } else if (isTask) {
      row(t('fDone'), truthy(it.done) ? '✓' : '—');
    }

    // Phone alert info
    if (truthy(it.sync_to_ios)) {
      const recList = parseRecipients(it.recipients);
      if (recList.length) {
        const chips = recList.map(rid => {
          const p = PERSON_BY_ID[rid];
          return p ? `<span class="chip ${p.cls}">${escapeHtml(personName(p.id))}</span>` : escapeHtml(rid);
        }).join(' ');
        row(t('fSendTo'), chips);
      } else {
        row(t('fSyncToIos'), '✓');
      }
      if (it.alarm_minutes !== '' && it.alarm_minutes !== null && it.alarm_minutes !== undefined) {
        const alarmKeys = {0:'alarmAtTime',5:'alarm5min',15:'alarm15min',30:'alarm30min',60:'alarm1hr',120:'alarm2hr',1440:'alarm1day',2880:'alarm2day',10080:'alarm1week'};
        const alarmKey = alarmKeys[Number(it.alarm_minutes)];
        if (alarmKey) row(t('fAlarm'), escapeHtml(t(alarmKey)));
      }
    }

    // Notes
    if (it.notes) {
      row(t('fNotesOpt').replace(/\s*\(.*\)$/,''), `<span style="white-space:pre-wrap">${escapeHtml(it.notes)}</span>`);
    }

    const titleText = it.title || (isTravel && (it.from_location || it.to_location)
      ? `${it.from_location || ''}${it.from_location && it.to_location ? ' → ' : ''}${it.to_location || ''}`
      : t('untitled'));
    const titleIcon = isTravel ? travelIconSvg(it.travel_method) : '';

    const dateForArgs = m.instanceDate || it.date || '';
    const isInst = !!m.isInstance;

    return `
      <div class="backdrop" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <h3 class="view-title">${titleIcon}${escapeHtml(titleText)}</h3>
          <div class="view-grid">${rows.join('')}</div>
          <div class="modal-actions view-actions">
            <button class="btn secondary" onclick="closeModal()">${escapeHtml(t('viewClose'))}</button>
            <button class="btn secondary" onclick="closeModal(); openEditFlow('${kind}','${it.id}','${dateForArgs}',${isInst})">✎ ${escapeHtml(t('editEvent1'))}</button>
            <button class="btn danger" onclick="closeModal(); openDeleteFlow('${kind}','${it.id}','${dateForArgs}',${isInst})">🗑</button>
          </div>
        </div>
      </div>
    `;
  }

  if (m.type === 'editEvent' || m.type === 'editTask') {
    const ev = m.item || {};
    const isTask = m.type === 'editTask' || (ev.done === true || ev.done === false || ev.done === 'true' || ev.done === 'false');
    const recurOpts = ['none','daily','weekly','fortnightly','monthly','yearly'];
    const recurLabels = { none: t('recNone'), daily: t('recDaily'), weekly: t('recWeekly'), fortnightly: t('recFortnightly'), monthly: t('recMonthly'), yearly: t('recYearly') };
    const titleP = isTask ? t('editTask1') : t('editEvent1');

// ----- Top-level render -----
function render() {
  let body = '';
  if (state.tab === 'calendar')      body = renderCalendar();
  else if (state.tab === 'create')   body = renderCreate();
  else if (state.tab === 'settings') body = renderSettings();
  document.getElementById('app').innerHTML = renderHeader() + body + renderModal();
  renderSyncPill();
}

// Background re-render — used by sync. Skips rebuilding the DOM while the user
// is actively typing in the Create tab or in a modal, since rebuilding wipes
// their input. Data is still updated in state and persisted; the next user
// interaction will pick up the fresh data automatically.
function rerenderActive() {
  if (state.tab === 'create' || state.modal) {
    // Just refresh the sync pill — leave the form alone
    renderSyncPill();
    return;
  }
  render();
}

// ----- Tab/calendar actions -----
function setTab(tab) {
  state.tab = tab;
  if (tab === 'calendar' && !state.selectedDate) state.selectedDate = todayKey();
  if (tab !== 'create') state.createPrefilledDate = null;
  render();
}
function setCalMode(mode) { state.calMode = mode; render(); }
function setCreateKind(kind) { state.createKind = kind; render(); }
function navMonth(delta) {
  const vm = state.viewMonth || new Date();
  state.viewMonth = new Date(vm.getFullYear(), vm.getMonth() + delta, 1);
  render();
}
function selectDay(key) {
  state.selectedDate = (state.selectedDate === key) ? null : key;
  render();
}
function pickChip(btn) {
  const parent = btn.parentElement;
  parent.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function getPickedChip(id) {
  const el = document.getElementById(id);
  if (!el) return '';
  const active = el.querySelector('button.active');
  return active ? active.dataset.val : '';
}
function toggleChip(btn) {
  // For multi-select chip pickers — flips this chip's active state, leaves siblings alone
  btn.classList.toggle('active');
}
function getPickedChips(id) {
  const el = document.getElementById(id);
  if (!el) return [];
  return Array.from(el.querySelectorAll('button.active')).map(b => b.dataset.val);
}
function onRecurChange() {
  const sel = document.getElementById('cf-recurring');
  const wrap = document.getElementById('cf-until-wrap');
  if (sel && wrap) wrap.style.display = (sel.value && sel.value !== 'none') ? 'block' : 'none';
}
function onModalRecurChange() {
  const sel = document.getElementById('f-recurring');
  const wrap = document.getElementById('f-until-wrap');
  if (sel && wrap) wrap.style.display = (sel.value && sel.value !== 'none') ? 'block' : 'none';
}
function onSyncIosChange() {
  const cb = document.getElementById('cf-sync-ios');
  const wrap = document.getElementById('cf-alarm-wrap');
  const rec = document.getElementById('cf-recipients-wrap');
  if (cb && wrap) wrap.style.display = cb.checked ? 'block' : 'none';
  if (cb && rec) rec.style.display = cb.checked ? 'block' : 'none';
}
function onModalSyncIosChange() {
  const cb = document.getElementById('f-sync-ios');
  const wrap = document.getElementById('f-alarm-wrap');
  const rec = document.getElementById('f-recipients-wrap');
  if (cb && wrap) wrap.style.display = cb.checked ? 'block' : 'none';
  if (cb && rec) rec.style.display = cb.checked ? 'block' : 'none';
}

// Build the "Send phone alert to" multi-select chip block.
// `prefix` is 'cf' for create-form or 'f' for edit-modal.
// `preselected` is an array of person ids that should be marked active.
function renderRecipientsBlock(prefix, preselected) {
  const sel = new Set(preselected || []);
  const humans = PEOPLE.filter(p => !p.pet);
  const wrapId = prefix + '-recipients-wrap';
  const pickerId = prefix + '-recipients';
  return `
    <div class="field" id="${wrapId}" style="display:none">
      <label>${escapeHtml(t('fSendTo'))}</label>
      <div class="chip-picker" id="${pickerId}">
        ${humans.map(p => `<button type="button" data-val="${p.id}" class="${sel.has(p.id) ? 'active' : ''}" onclick="toggleChip(this)">${escapeHtml(personName(p.id))}</button>`).join('')}
      </div>
    </div>
  `;
}

// Same but for the edit modal — initial display matches the syncIos state of the item being edited
function renderRecipientsBlockEdit(item) {
  const preselected = parseRecipients(item.recipients);
  const sel = new Set(preselected);
  const humans = PEOPLE.filter(p => !p.pet);
  const display = truthy(item.sync_to_ios) ? 'block' : 'none';
  return `
    <div class="field" id="f-recipients-wrap" style="display:${display}">
      <label>${escapeHtml(t('fSendTo'))}</label>
      <div class="chip-picker" id="f-recipients">
        ${humans.map(p => `<button type="button" data-val="${p.id}" class="${sel.has(p.id) ? 'active' : ''}" onclick="toggleChip(this)">${escapeHtml(personName(p.id))}</button>`).join('')}
      </div>
    </div>
  `;
}

function parseRecipients(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw.filter(Boolean);
  return String(raw).split(',').map(s => s.trim()).filter(Boolean);
}
function serialiseRecipients(arr) {
  return (arr || []).filter(Boolean).join(',');
}

function goToCreate(kind, date) {
  state.tab = 'create';
  state.createKind = kind;
  state.createPrefilledDate = date || null;
  render();
}

// ----- View / Edit / delete flows (recurring-aware) -----
function openViewFlow(kind, id, instanceDate, isInstance) {
  const list = kind === 'events' ? state.events : state.bills;
  const item = list.find(x => x.id === id);
  if (!item) return;
  state.modal = { type: 'viewItem', kind, item, instanceDate, isInstance };
  render();
}

function openEditFlow(kind, id, instanceDate, isInstance) {
  const list = kind === 'events' ? state.events : state.bills;
  const item = list.find(x => x.id === id);
  if (!item) return;
  const isRecurring = item.recurring && item.recurring !== 'none' && item.recurring !== '';
  if (isRecurring && isInstance) {
    state.modal = { type: 'recurChoice', mode: 'edit', kind, id, instanceDate, item };
    render();
    return;
  }
  // Direct edit
  if (kind === 'events') {
    if (item.kind === 'travel') {
      state.editTzFrom = item.from_tz || getDeviceTimezone();
      state.editTzTo   = item.to_tz   || state.editTzFrom;
      state.modal = { type: 'editTravel', item };
    } else {
      const isTask = item.done === true || item.done === false || item.done === 'true' || item.done === 'false';
      state.modal = { type: isTask ? 'editTask' : 'editEvent', item };
    }
  } else {
    state.modal = { type: 'editBill', item };
  }
  render();
}

function openDeleteFlow(kind, id, instanceDate, isInstance) {
  console.log('[DELETE] openDeleteFlow called:', {kind, id, instanceDate, isInstance});
  const list = kind === 'events' ? state.events : state.bills;
  const item = list.find(x => x.id === id);

  if (!item) { console.log('[DELETE] EXIT: item not found in state'); return; }
  const isRecurring = item.recurring && item.recurring !== 'none' && item.recurring !== '';
  console.log('[DELETE] isRecurring:', isRecurring);
  if (isRecurring && isInstance) {

function confirmDeleteSeries(kind, id) {

async function recurChoice(choice) {
  const m = state.modal;
  if (!m || m.type !== 'recurChoice') return;
  const { kind, id, instanceDate, mode, item } = m;
  state.modal = null;

  if (choice === 'skip') {
    // Add instanceDate to exceptions array
    let exceptions = getExceptions(item);
    if (!exceptions.includes(instanceDate)) exceptions.push(instanceDate);
    const updated = { ...item, exceptions: JSON.stringify(exceptions) };
    if (kind === 'events') await updateEvent(updated);
    else await updateBill(updated);
    render();
    toast(t('toastSkipped'));
    return;
  }

  if (choice === 'end') {
    // Set recur_until = day before instanceDate
    const d = parseKey(instanceDate);
    if (d) d.setDate(d.getDate() - 1);
    const newUntil = d ? dateKey(d) : '';
    const updated = { ...item, recur_until: newUntil };
    if (kind === 'events') await updateEvent(updated);
    else await updateBill(updated);
    render();
    toast(t('toastSeriesEnded'));
    return;
  }

  if (choice === 'whole') {
    if (mode === 'delete') {
      // Delete the master record
      if (kind === 'events') { await deleteEvent(id); toast(t('toastEventDeleted')); }
      else { await deleteBill(id); toast(t('toastBillDeleted')); }
      render();
    } else {
      // Open edit modal on master
      if (kind === 'events') {
        const isTask = item.done === true || item.done === false || item.done === 'true' || item.done === 'false';
        state.modal = { type: isTask ? 'editTask' : 'editEvent', item };
      } else {
        state.modal = { type: 'editBill', item };
      }
      render();
    }
  }
}

// ----- Save handlers -----
async function submitCreate(kind) {
  if (state.saving) return;
  const title = document.getElementById('cf-title').value.trim();
  const date  = document.getElementById('cf-date').value;
  const assignee = getPickedChip('cf-assignee');
  if (!title) { toast(t('toastTitleRequired')); return; }
  if (kind === 'bill' && !date) { toast(t('toastTitleDateRequired')); return; }

  state.saving = true;
  // Re-render so the Create button shows "Creating…" + disabled
  rerenderActive();

  try {
    await submitCreateInner(kind, title, date, assignee);
  } catch (err) {
    console.error('[CREATE] failed:', err);
    toast(t('toastEventAdded')); // fallback toast even on failure
  } finally {
    state.saving = false;
    rerenderActive();
  }
}

async function submitCreateInner(kind, title, date, assignee) {
  if (kind === 'event' || kind === 'task') {
    const time = document.getElementById('cf-time').value;
    const endTime = document.getElementById('cf-end-time').value;
    const recurring = document.getElementById('cf-recurring').value;
    const recurUntilEl = document.getElementById('cf-recur-until');
    const recurUntil = recurUntilEl ? recurUntilEl.value : '';
    const notes = document.getElementById('cf-notes').value.trim();
    const autoRollEl = document.getElementById('cf-auto-roll');
    const autoRoll = autoRollEl ? autoRollEl.checked : false;
    const syncIos = document.getElementById('cf-sync-ios').checked;
    const alarmRaw = document.getElementById('cf-alarm').value;
    const recipients = syncIos ? serialiseRecipients(getPickedChips('cf-recipients')) : '';
    const item = {
      title, date, time, end_time: endTime, assignee, notes,
      recurring,
      recur_until: (recurring && recurring !== 'none') ? recurUntil : '',
      exceptions: '',
      done: kind === 'task' ? false : '',
      auto_roll: autoRoll,
      sync_to_ios: syncIos,
      recipients,
      alarm_minutes: syncIos && alarmRaw !== '' ? parseInt(alarmRaw, 10) : ''
    };
    await addEvent(item);
    toast(t('toastEventAdded'));
  } else if (kind === 'bill') {
    const amount = parseFloat(document.getElementById('cf-amount').value) || 0;
    const recurring = document.getElementById('cf-recurring').value;
    const recurUntilEl = document.getElementById('cf-recur-until');
    const recurUntil = recurUntilEl ? recurUntilEl.value : '';
    const notes = document.getElementById('cf-notes').value.trim();
    const syncIos = document.getElementById('cf-sync-ios').checked;
    const alarmRaw = document.getElementById('cf-alarm').value;
    const recipients = syncIos ? serialiseRecipients(getPickedChips('cf-recipients')) : '';
    const item = {
      title, amount, date, assignee, notes,
      recurring,
      recur_until: (recurring && recurring !== 'none') ? recurUntil : '',
      exceptions: '',
      paid: false,
      sync_to_ios: syncIos,
      recipients,
      alarm_minutes: syncIos && alarmRaw !== '' ? parseInt(alarmRaw, 10) : ''
    };
    await addBill(item);
    toast(t('toastBillAdded'));
  } else if (kind === 'travel') {
    const time = document.getElementById('cf-time').value;
    const endTime = document.getElementById('cf-end-time').value;
    const endDate = document.getElementById('cf-end-date').value || date;
    const fromLoc = document.getElementById('cf-from-location').value.trim();
    const toLoc   = document.getElementById('cf-to-location').value.trim();
    const fromTz  = state.createTzFrom || getDeviceTimezone();
    const toTz    = state.createTzTo   || fromTz;
    const method  = getPickedChip('cf-travel-method');
    const notes = document.getElementById('cf-notes').value.trim();
    const syncIos = document.getElementById('cf-sync-ios').checked;
    const alarmRaw = document.getElementById('cf-alarm').value;
    const recipients = syncIos ? serialiseRecipients(getPickedChips('cf-recipients')) : '';
    const item = {
      kind: 'travel',
      title, date, end_date: endDate, time, end_time: endTime,
      from_location: fromLoc, to_location: toLoc,
      from_tz: fromTz, to_tz: toTz,
      travel_method: method,
      assignee, notes,
      recurring: 'none', recur_until: '', exceptions: '',
      sync_to_ios: syncIos,
      recipients,
      alarm_minutes: syncIos && alarmRaw !== '' ? parseInt(alarmRaw, 10) : ''
    };
    rememberTimezone(fromTz); rememberTimezone(toTz);
    await addEvent(item);
    toast(t('toastEventAdded'));
    state.createTzFrom = null; state.createTzTo = null;
  }
  state.tab = 'calendar';
  state.calMode = (kind === 'bill') ? 'bills' : 'events';
  state.selectedDate = date || todayKey();
  state.createPrefilledDate = null;
  render();
}

async function saveEvent(existingId, isTask) {
  if (state.saving) return;
  if (!existingId) return;
  const existing = state.events.find(x => x.id === existingId);
  if (!existing) return;
  const title = document.getElementById('f-title').value.trim();
  const date  = document.getElementById('f-date').value;
  const time  = document.getElementById('f-time').value;
  const endTime = document.getElementById('f-end-time').value;
  const recurring = document.getElementById('f-recurring').value;
  const recurUntilEl = document.getElementById('f-recur-until');
  const recurUntil = recurUntilEl ? recurUntilEl.value : '';
  const notes = document.getElementById('f-notes').value.trim();
  const assignee = getPickedChip('f-assignee');
  const syncIos = document.getElementById('f-sync-ios').checked;
  const alarmRaw = document.getElementById('f-alarm').value;
  const recipients = syncIos ? serialiseRecipients(getPickedChips('f-recipients')) : '';
  if (!title || !date) { toast(t('toastTitleDateRequired')); return; }
  const payload = {
    ...existing,
    title, date, time, end_time: endTime, notes, assignee,
    recurring,
    recur_until: (recurring && recurring !== 'none') ? recurUntil : '',
    sync_to_ios: syncIos,
    recipients,
    alarm_minutes: syncIos && alarmRaw !== '' ? parseInt(alarmRaw, 10) : ''
  };
  if (isTask) {
    const autoRollEl = document.getElementById('f-auto-roll');
    const doneEl = document.getElementById('f-done');
    payload.auto_roll = autoRollEl ? autoRollEl.checked : false;
    payload.done = doneEl ? doneEl.checked : false;
  }
  state.saving = true;
  render();
  try {
    await updateEvent(payload);
    state.modal = null;
    toast(t('toastEventUpdated'));
  } catch (err) {
    console.error('[SAVE] saveEvent failed:', err);
    toast(t('toastSaveFailed'));
  } finally {
    state.saving = false;
    render();
  }
}

async function togglePaid(id) {
  const b = state.bills.find(x => x.id === id);
  if (!b) return;
  const updated = { ...b, paid: !truthy(b.paid) };
  await updateBill(updated);
  toast(updated.paid ? t('toastPaid') : t('toastUnpaid'));
}

async function toggleEventDone(id) {
  const ev = state.events.find(x => x.id === id);
  if (!ev) return;
  const newDone = !truthy(ev.done);
  const autoRoll = truthy(ev.auto_roll);
  if (newDone && autoRoll && ev.recurring && ev.recurring !== 'none' && ev.date) {
    const nextDate = rollDate(ev.date, ev.recurring);
    await updateEvent({ ...ev, date: nextDate, done: false });
    toast(t('toastRolledForward'));
    return;
  }
  await updateEvent({ ...ev, done: newDone });
  toast(newDone ? t('toastDone') : t('toastUndone'));
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  state.modal = null;
  render();
}

function runModalConfirm() {
  const m = state.modal;
  console.log('[CONFIRM] runModalConfirm called, modal:', m);
  if (!m || m.type !== 'confirm' || typeof m.onConfirm !== 'function') {
    console.log('[CONFIRM] EXIT: invalid state', {hasModal: !!m, type: m && m.type, hasFn: typeof (m && m.onConfirm)});
    return;
  }
  m.onConfirm();
}

function cancelTzPicker(e) {
  if (e && e.target !== e.currentTarget) return;
  const m = state.modal;
  state.tzPickerQuery = '';
  state.modal = (m && m.prev) ? m.prev : null;
  render();
}

// ----- Settings actions -----
function saveSyncUrl() {
  const url = document.getElementById('syncUrl').value.trim();
  setSyncUrl(url);
  toast(t('toastUrlSaved'));
  if (url) { syncPull(); flushPending(); startPolling(); }
}
async function testSync() {
  const url = document.getElementById('syncUrl').value.trim();
  setSyncUrl(url);
  await syncPull();
  await flushPending();
  startPolling();
  render();
}
function exportBackup() {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    events: state.events,
    bills: state.bills
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'family-calendar-backup-' + todayKey() + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast(t('toastBackupDownloaded'));
}
function importBackup(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const data = JSON.parse(r.result);
      if (!data.events || !data.bills) throw new Error('bad file');
      state.modal = {
        type: 'confirm',
        title: t('confirmReplace'),
        body: t('confirmReplaceBody'),
        confirmLabel: t('replaceBtn'),
        onConfirm: async () => {
          state.events = data.events;
          state.bills = data.bills;
          lsSet(LS.events, state.events);
          lsSet(LS.bills, state.bills);
          state.modal = null; render();
          toast(t('toastImported'));
        }
      };
      render();
    } catch {
      toast(t('toastInvalidFile'));
    }
  };
  r.readAsText(file);
}
function wipeLocal() {
  state.modal = {
    type: 'confirm',
    title: t('confirmWipe'),
    body: t('confirmWipeBody'),
    confirmLabel: t('wipeBtn'),
    onConfirm: async () => {
      state.events = []; state.bills = [];
      lsSet(LS.events, []); lsSet(LS.bills, []); lsSet(LS.pending, []);
      state.modal = null; render();
      toast(t('toastCacheCleared'));
      if (getSyncUrl()) syncPull();
    }
  };
  render();
}

// ----- Toast -----
function toast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 2200);
}

// ----- Escape helpers -----
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// ----- Init -----
function init() {
  state.lang = getLang();
  document.documentElement.lang = I18N[state.lang].htmlLang;
  document.body.classList.toggle('lang-zh', state.lang === 'zh');
  state.events = lsGet(LS.events, []);
  state.bills  = lsGet(LS.bills, []);
  state.viewMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  state.selectedDate = todayKey();
  render();
  if (getSyncUrl()) {
    syncPull();
    flushPending();
    startPolling();
  } else {
    setSync('idle', t('syncIdle'));
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && getSyncUrl()) {
      syncPull();
      flushPending();
    }
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

init();
